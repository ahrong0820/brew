name: Apply site audit fix

on:
  push:
    branches:
      - fix-site-audit-stability

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-site-audit-stability
      - name: Patch audited UI behavior
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("app/page.tsx")
          source = path.read_text()

          select_replacement = '''  function selectRecipe(recipe: Recipe) {
            const current = readBrewSessionClock();
            const sameTrackedRecipe = Boolean(
              current?.sessionId &&
                current.status !== "completed" &&
                current.recipe?.id === recipe.id,
            );

            if (sameTrackedRecipe) {
              setTimerNotice(null);
              document.getElementById("brew-timer-panel")?.scrollIntoView({
                behavior: "smooth",
                block: "start",
              });
              return;
            }

            if (isDifferentTrackedRecipe(current, recipe)) {
              setTimerNotice("진행 중인 추천 추출을 완료한 뒤 다른 레시피를 선택해 주세요.");
              document.getElementById("brew-timer-panel")?.scrollIntoView({
                behavior: "smooth",
                block: "start",
              });
              return;
            }

            clearBrewSessionClock();
            setSelectedId(recipe.id);
            setDose(recipe.dose);
            setTimerNotice(null);
            completionPlayedRef.current = false;
            previousElapsedRef.current = 0;
          }

          function toggleFavorite'''
          source, count = re.subn(
              r"  function selectRecipe\(recipe: Recipe\) \{.*?\n  \}\n\n  function toggleFavorite",
              select_replacement,
              source,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit("selectRecipe patch failed")

          delete_replacement = '''  function deleteCustomRecipe(recipeId: string) {
            const activeClock = readBrewSessionClock();
            const deletingActiveRecipe = Boolean(
              activeClock?.sessionId &&
                activeClock.status !== "completed" &&
                activeClock.recipe?.id === recipeId,
            );

            if (deletingActiveRecipe) {
              setTimerNotice(
                "진행 중인 사용자 레시피는 타이머를 완료하거나 초기화한 뒤 삭제해 주세요.",
              );
              document.getElementById("brew-timer-panel")?.scrollIntoView({
                behavior: "smooth",
                block: "start",
              });
              return;
            }

            setCustomRecipes((currentRecipes) =>
              currentRecipes.filter((recipe) => recipe.id !== recipeId),
            );
            setFavoriteIds((currentIds) => currentIds.filter((id) => id !== recipeId));

            if (selectedId === recipeId) {
              clearBrewSessionClock();
              setSelectedId(recipes[0].id);
              setDose(recipes[0].dose);
              setTimerNotice(null);
              completionPlayedRef.current = false;
              previousElapsedRef.current = 0;
            }
          }

          function resetTimer'''
          source, count = re.subn(
              r"  function deleteCustomRecipe\(recipeId: string\) \{.*?\n  \}\n\n  function resetTimer",
              delete_replacement,
              source,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit("deleteCustomRecipe patch failed")

          replacements = [
              (
                  '                onChange={(event) => setQuery(event.target.value)}\n                placeholder="원두, 도구, 향미 검색"',
                  '                onChange={(event) => setQuery(event.target.value)}\n                aria-label="레시피 검색"\n                placeholder="원두, 도구, 향미 검색"',
              ),
              (
                  '                  onClick={() => setFilter(option)}\n                  className={`h-9 shrink-0',
                  '                  onClick={() => setFilter(option)}\n                  aria-pressed={filter === option}\n                  className={`h-9 shrink-0',
              ),
              (
                  '              {timerNotice && (\n                <p className="mt-3 rounded-md bg-[#fff3df] px-3 py-2 text-xs leading-5 text-[#805526]">',
                  '              {timerNotice && (\n                <p role="status" aria-live="polite" className="mt-3 rounded-md bg-[#fff3df] px-3 py-2 text-xs leading-5 text-[#805526]">',
              ),
              (
                  '                onClick={() => setAlertsEnabled((current) => !current)}\n                className={`flex h-10',
                  '                onClick={() => setAlertsEnabled((current) => !current)}\n                aria-pressed={alertsEnabled}\n                className={`flex h-10',
              ),
              (
                  '                onClick={() => toggleFavorite(selectedRecipe.id)}\n                className={`flex h-10',
                  '                onClick={() => toggleFavorite(selectedRecipe.id)}\n                aria-pressed={selectedIsFavorite}\n                className={`flex h-10',
              ),
              (
                  '                    value={dose}\n                    onChange={(event) => setDose(Number(event.target.value))}\n                    className="h-10',
                  '                    value={dose}\n                    onChange={(event) => {\n                      const nextDose = Number(event.target.value);\n                      if (Number.isFinite(nextDose)) {\n                        setDose(clampNumber(nextDose, 8, 40));\n                      }\n                    }}\n                    className="h-10',
              ),
              (
                  '                    key={`${selectedRecipe.id}-${step.label}`}',
                  '                    key={`${selectedRecipe.id}-${index}-${step.label}`}',
              ),
          ]

          for old, new in replacements:
              if old not in source:
                  raise SystemExit(f"Expected snippet not found: {old[:120]}")
              source = source.replace(old, new, 1)

          custom_marker = '          <section className="rounded-lg border border-[#d7ded4] bg-white p-5 shadow-sm shadow-black/5">\n            <div className="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">\n              <div>\n                <p className="text-xs font-semibold uppercase text-[#607064]">\n                  Custom Recipe'
          empty_state = '''          {filteredRecipes.length === 0 ? (
            <p
              role="status"
              className="rounded-lg border border-dashed border-[#bfc9bd] bg-white px-5 py-8 text-center text-sm text-[#607064]"
            >
              검색 조건에 맞는 레시피가 없습니다.
            </p>
          ) : null}

'''
          if custom_marker not in source:
              raise SystemExit("custom recipe marker not found")
          source = source.replace(custom_marker, empty_state + custom_marker, 1)

          path.write_text(source)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/page.tsx
          git commit -m "fix: harden recipe selection and accessibility"
          git push origin HEAD:fix-site-audit-stability
