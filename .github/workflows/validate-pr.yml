name: Validate pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests and save output
        run: |
          set +e
          pnpm test > test-output.log 2>&1
          echo "$?" > test-status.txt
          exit 0

      - name: Upload test output
        uses: actions/upload-artifact@v4
        with:
          name: ratio-test-output
          path: |
            test-output.log
            test-status.txt

      - name: Fail when tests failed
        run: |
          status=$(cat test-status.txt)
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
