name: Validate pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          show-progress: false

      - name: Apply partial-source UI patch
        run: |
          python - <<'PY'
          from pathlib import Path

          clever_path = Path('lib/recommendation/cleverRecommendation.ts')
          clever = clever_path.read_text()
          clever = clever.replace('[클레버 분쇄 변환]', '[클레버 분쇄]')
          clever = clever.replace(
              '개인 조정값으로 이번 추출은 교반을 생략합니다.',
              '개인 조정값으로 이번 추출은 교반 생략을 적용합니다.',
          )
          clever_path.write_text(clever)

          recipe_path = Path('data/jisCleverRecipes.ts')
          recipe = recipe_path.read_text().replace(
              'sourceStatus: "reference",',
              'sourceStatus: "partial",',
              1,
          )
          recipe_path.write_text(recipe)

          drawer_path = Path('app/RecommendationDrawerV2.tsx')
          drawer = drawer_path.read_text()
          old_prefixes = '''        "[클레버 분쇄]",
          "[배전도 온도]",'''
          new_prefixes = '''        "[클레버 분쇄]",
          "[부분 검증 원본]",
          "[원본과 앱 조정 분리]",
          "[배전도 온도]",'''
          assert old_prefixes in drawer
          drawer = drawer.replace(old_prefixes, new_prefixes, 1)

          marker = '''                          {recommendation.sourceStatus === "reference" && (
                            <span className="rounded-full bg-[#fff4df] px-2.5 py-1 text-xs font-bold text-[#805d25]">
                              참고 레시피
                            </span>
                          )}'''
          partial = '''                          {recommendation.sourceStatus === "partial" && (
                            <span className="rounded-full bg-[#e8eef8] px-2.5 py-1 text-xs font-bold text-[#34527a]">
                              부분 검증
                            </span>
                          )}
'''
          assert marker in drawer
          drawer = drawer.replace(marker, partial + marker, 1)
          drawer_path.write_text(drawer)
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/RecommendationDrawerV2.tsx data/jisCleverRecipes.ts lib/recommendation/cleverRecommendation.ts
          git commit -m "feat: show partial Clever source state" || true
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Run automated tests
        run: pnpm test

      - name: Upload failed test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-${{ github.run_id }}
          path: test-failure.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Write deployment metadata
        run: |
          mkdir -p public/deployments
          cat > public/deployment.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "sha": "${GITHUB_SHA}",
            "runId": "${GITHUB_RUN_ID}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cp public/deployment.json "public/deployments/${GITHUB_SHA}.json"

      - name: Build GitHub Pages
        run: pnpm build:github
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /brew
          NEXT_PUBLIC_DEPLOYMENT_SHA: ${{ github.sha }}

      - name: Validate static export
        run: pnpm run validate:static-export out "$GITHUB_SHA"

      - name: Install Playwright Chromium
        run: |
          pnpm add --save-dev --lockfile=false playwright@1.55.0
          pnpm exec playwright install --with-deps chromium

      - name: Run mobile browser E2E
        run: node e2e/mobile-flow.mjs

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-${{ github.run_id }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 3
