name: Validate pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run lint
        run: npm run lint

      - name: Build GitHub Pages
        run: npm run build:github
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /brew
          NEXT_PUBLIC_DEPLOYMENT_SHA: ${{ github.sha }}

      - name: Validate HTML deployment marker
        run: |
          deployment_meta="$(grep -o '<meta[^>]*name="deployment-sha"[^>]*>' out/index.html | head -n 1 || true)"

          test -f out/index.html
          test -n "$deployment_meta"
          printf '%s' "$deployment_meta" | grep -Fq "content=\"${GITHUB_SHA}\""
