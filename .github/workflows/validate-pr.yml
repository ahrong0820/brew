name: Validate pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Locate fixed evidence registry assertions
        run: |
          grep -RInE 'evidenceRegistryVersion|1\.14\.0|1\.15\.0' test || true
          exit 1
