name: Validate pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Capture concise failing tests
        run: |
          curl -fsSL "https://codeload.github.com/${GITHUB_REPOSITORY}/zip/${GITHUB_SHA}" -o repo.zip
          unzip -q repo.zip
          cd "$(find . -maxdepth 1 -type d -name 'brew-*' | head -n 1)"
          corepack enable
          pnpm install --frozen-lockfile >/dev/null
          set +e
          pnpm test > test-output.log 2>&1
          status=$?
          grep -nE 'not ok|AssertionError|ERR_|error:|expected:|actual:|operator:' test-output.log | head -n 100 || true
          exit $status
