name: Validate pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture concise failing tests
        run: |
          set +e
          pnpm test > test-output.log 2>&1
          status=$?
          grep -nE 'not ok|AssertionError|ERR_|error:|expected:|actual:|operator:' test-output.log | head -n 160 || true
          exit $status
