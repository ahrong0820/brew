name: Validate pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          show-progress: false

      - name: Load refreshed recipe data
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("app/page.tsx")
          text = path.read_text()
          text = text.replace(
              'const basePath = process.env.NEXT_PUBLIC_BASE_PATH ?? "";\n',
              'import { buildDefaultRecipes } from "@/data/defaultRecipeRefresh";\n\nconst basePath = process.env.NEXT_PUBLIC_BASE_PATH ?? "";\n',
              1,
          )
          text = text.replace("const recipes: Recipe[] = [", "const legacyRecipes: Recipe[] = [", 1)
          path.write_text(text)
          PY

      - name: Build current recipe array
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("app/page.tsx")
          text = path.read_text()
          text = text.replace(
              "];\n\nconst filterOptions = [",
              "];\n\nconst recipes: Recipe[] = buildDefaultRecipes(legacyRecipes);\n\nconst filterOptions = [",
              1,
          )
          path.write_text(text)
          PY

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Run automated tests
        run: pnpm test

      - name: Upload failed test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-${{ github.run_id }}
          path: test-failure.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Write deployment metadata
        run: |
          mkdir -p public/deployments
          cat > public/deployment.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "sha": "${GITHUB_SHA}",
            "runId": "${GITHUB_RUN_ID}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cp public/deployment.json "public/deployments/${GITHUB_SHA}.json"

      - name: Build GitHub Pages
        run: pnpm build:github
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /brew
          NEXT_PUBLIC_DEPLOYMENT_SHA: ${{ github.sha }}

      - name: Validate static export
        run: pnpm run validate:static-export out "$GITHUB_SHA"

      - name: Install Playwright Chromium
        run: |
          pnpm add --save-dev --lockfile=false playwright@1.55.0
          pnpm exec playwright install --with-deps chromium

      - name: Run mobile browser E2E
        run: |
          node e2e/mobile-flow.mjs
          node e2e/recommendation-flow.mjs

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-${{ github.run_id }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 3
