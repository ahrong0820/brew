name: Apply brew session follow-up

on:
  push:
    branches:
      - feat/unify-brew-session-timer

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/unify-brew-session-timer
          fetch-depth: 0

      - name: Apply follow-up changes
        run: node scripts/apply-brew-session-followup.mjs

      - name: Remove one-time files
        run: |
          rm scripts/apply-brew-session-followup.mjs
          rm .github/workflows/apply-brew-session-followup.yml

      - name: Commit follow-up changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx lib/timer/brewSessionClock.ts scripts/apply-brew-session-followup.mjs .github/workflows/apply-brew-session-followup.yml
          git commit -m "fix: preserve active session across timer edge cases"
          git push origin HEAD:feat/unify-brew-session-timer
