name: Finalize trace cleanup

on:
  push:
    branches:
      - recommendation-trace-snapshot

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: recommendation-trace-snapshot
      - run: |
          git rm .github/workflows/cleanup-trace-script.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove temporary cleanup workflow"
          git push origin HEAD:recommendation-trace-snapshot
