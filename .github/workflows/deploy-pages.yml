name: Deploy GitHub Pages
run-name: Deploy ${{ github.sha }} to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write deployment metadata
        run: |
          mkdir -p public/deployments
          cat > public/deployment.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "sha": "${GITHUB_SHA}",
            "runId": "${GITHUB_RUN_ID}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cp public/deployment.json "public/deployments/${GITHUB_SHA}.json"

      - name: Build static export
        run: pnpm build:github
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /brew
          NEXT_PUBLIC_DEPLOYMENT_SHA: ${{ github.sha }}

      - name: Validate static export
        run: |
          immutable_marker="out/deployments/${GITHUB_SHA}.json"
          deployment_meta="$(grep -o '<meta[^>]*name="deployment-sha"[^>]*>' out/index.html | head -n 1 || true)"

          test -f out/index.html
          test -d out/_next
          test -f out/deployment.json
          test -f "$immutable_marker"
          test -n "$deployment_meta"
          grep -Fq "\"sha\": \"${GITHUB_SHA}\"" out/deployment.json
          grep -Fq "\"sha\": \"${GITHUB_SHA}\"" "$immutable_marker"
          printf '%s' "$deployment_meta" | grep -Fq "content=\"${GITHUB_SHA}\""
          cmp --silent out/deployment.json "$immutable_marker"
          touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed commit
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          immutable_marker_url="${PAGE_URL%/}/deployments/${GITHUB_SHA}.json"
          latest_marker_url="${PAGE_URL%/}/deployment.json?run=${GITHUB_RUN_ID}"
          page_url="${PAGE_URL%/}/?deployment=${GITHUB_SHA}&run=${GITHUB_RUN_ID}"

          for attempt in {1..30}; do
            immutable_metadata="$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$immutable_marker_url" || true)"

            latest_metadata="$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$latest_marker_url" || true)"

            deployed_html="$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$page_url" || true)"

            deployment_meta="$(printf '%s' "$deployed_html" | grep -o '<meta[^>]*name="deployment-sha"[^>]*>' | head -n 1 || true)"
            immutable_matches=false
            latest_matches=false
            html_matches=false

            if printf '%s' "$immutable_metadata" | grep -Fq "\"sha\": \"${GITHUB_SHA}\""; then
              immutable_matches=true
            fi

            if printf '%s' "$latest_metadata" | grep -Fq "\"sha\": \"${GITHUB_SHA}\""; then
              latest_matches=true
            fi

            if [ -n "$deployment_meta" ] && printf '%s' "$deployment_meta" | grep -Fq "content=\"${GITHUB_SHA}\""; then
              html_matches=true
            fi

            if [ "$immutable_matches" = true ] && [ "$latest_matches" = true ] && [ "$html_matches" = true ]; then
              echo "Verified deployed commit ${GITHUB_SHA}"
              echo "Immutable marker: ${immutable_marker_url}"
              echo "HTML marker: ${deployment_meta}"
              exit 0
            fi

            sleep 5
          done

          echo "Expected commit ${GITHUB_SHA} was not observed in all deployment markers."
          echo "Immutable marker: ${immutable_marker_url}"
          echo "Latest marker: ${latest_marker_url}"
          echo "Page: ${page_url}"
          exit 1
