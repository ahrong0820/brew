name: Deploy GitHub Pages
run-name: Deploy ${{ github.sha }} to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Write deployment metadata
        run: |
          mkdir -p public/deployments
          cat > public/deployment.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "sha": "${GITHUB_SHA}",
            "runId": "${GITHUB_RUN_ID}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cp public/deployment.json "public/deployments/${GITHUB_SHA}.json"

      - name: Build static export
        run: pnpm build:github
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /brew
          NEXT_PUBLIC_DEPLOYMENT_SHA: ${{ github.sha }}

      - name: Validate static export
        run: |
          pnpm run validate:static-export out "$GITHUB_SHA"
          pnpm run validate:recipe-content out/index.html
          touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Publish live verification pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(jq -n \
            --arg state "pending" \
            --arg target_url "$target_url" \
            --arg description "Waiting for deployed JSON, HTML SHA, and recipe content verification" \
            --arg context "github-pages/live-verification" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed commit
        id: live_verification
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          immutable_marker_url="${PAGE_URL%/}/deployments/${GITHUB_SHA}.json"
          latest_marker_url="${PAGE_URL%/}/deployment.json?run=${GITHUB_RUN_ID}"
          page_url="${PAGE_URL%/}/?deployment=${GITHUB_SHA}&run=${GITHUB_RUN_ID}"

          for attempt in {1..30}; do
            immutable_metadata="$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$immutable_marker_url" || true)"

            latest_metadata="$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$latest_marker_url" || true)"

            deployed_html="$(curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$page_url" || true)"

            deployment_meta="$(printf '%s' "$deployed_html" | grep -o '<meta[^>]*name="deployment-sha"[^>]*>' | head -n 1 || true)"
            immutable_matches=false
            latest_matches=false
            html_matches=false

            if printf '%s' "$immutable_metadata" | grep -Fq "\"sha\": \"${GITHUB_SHA}\""; then
              immutable_matches=true
            fi

            if printf '%s' "$latest_metadata" | grep -Fq "\"sha\": \"${GITHUB_SHA}\""; then
              latest_matches=true
            fi

            if [ -n "$deployment_meta" ] && printf '%s' "$deployment_meta" | grep -Fq "content=\"${GITHUB_SHA}\""; then
              html_matches=true
            fi

            if [ "$immutable_matches" = true ] && [ "$latest_matches" = true ] && [ "$html_matches" = true ]; then
              echo "Verified deployed commit ${GITHUB_SHA}"
              echo "Immutable marker: ${immutable_marker_url}"
              echo "HTML marker: ${deployment_meta}"
              exit 0
            fi

            sleep 5
          done

          echo "Expected commit ${GITHUB_SHA} was not observed in all deployment markers."
          echo "Immutable marker: ${immutable_marker_url}"
          echo "Latest marker: ${latest_marker_url}"
          echo "Page: ${page_url}"
          exit 1

      - name: Verify deployed recipe content
        id: content_verification
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          node scripts/validate-recipe-content.mjs "${PAGE_URL%/}/?deployment=${GITHUB_SHA}&run=${GITHUB_RUN_ID}&content=1"

      - name: Publish live verification result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          VERIFY_OUTCOME: ${{ steps.live_verification.outcome }}
          CONTENT_OUTCOME: ${{ steps.content_verification.outcome }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$VERIFY_OUTCOME" = "success" ] && [ "$CONTENT_OUTCOME" = "success" ]; then
            state="success"
            description="Deployment JSON, live HTML SHA, and recipe content match this commit"
          else
            state="failure"
            description="Deployment, live SHA, or recipe content verification failed"
          fi

          payload="$(jq -n \
            --arg state "$state" \
            --arg target_url "$target_url" \
            --arg description "$description" \
            --arg context "github-pages/live-verification" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"

      - name: Fail job when live verification failed
        if: always() && (steps.deployment.outcome != 'success' || steps.live_verification.outcome != 'success' || steps.content_verification.outcome != 'success')
        run: |
          echo "GitHub Pages deployment did not pass live verification."
          exit 1
