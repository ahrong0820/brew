name: Deploy GitHub Pages
run-name: Deploy ${{ github.sha }} to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  pull_request_target:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'deploy-pages') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       github.event.comment.body == '/deploy-pages' &&
       github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Publish build verification pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(jq -n \
            --arg state "pending" \
            --arg target_url "$target_url" \
            --arg description "Build, tests, browser E2E, and deployment verification pending" \
            --arg context "github-pages/live-verification" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Write deployment metadata and recipe manifest
        run: |
          mkdir -p public/deployments
          cat > public/deployment.json <<EOF_META
          {
            "repository": "${GITHUB_REPOSITORY}",
            "sha": "${GITHUB_SHA}",
            "runId": "${GITHUB_RUN_ID}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF_META
          cp public/deployment.json "public/deployments/${GITHUB_SHA}.json"
          pnpm run write:recipe-manifest "$GITHUB_SHA"

      - name: Build static export
        run: pnpm build:github
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /brew
          NEXT_PUBLIC_DEPLOYMENT_SHA: ${{ github.sha }}

      - name: Validate static export
        run: |
          pnpm run validate:static-export out "$GITHUB_SHA"
          pnpm run validate:recipe-content out/index.html
          touch out/.nojekyll

      - name: Install Playwright Chromium
        run: |
          pnpm add --save-dev --lockfile=false playwright@1.55.0
          pnpm exec playwright install --with-deps chromium

      - name: Run browser E2E
        run: pnpm run test:e2e

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-e2e-failure-${{ github.run_id }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

      - name: Publish build verification failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(jq -n \
            --arg state "failure" \
            --arg target_url "$target_url" \
            --arg description "Build, tests, static export, or browser E2E failed" \
            --arg context "github-pages/live-verification" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0

      - name: Publish live verification pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload="$(jq -n \
            --arg state "pending" \
            --arg target_url "$target_url" \
            --arg description "Waiting for stable multi-response deployment verification" \
            --arg context "github-pages/live-verification" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify stable deployed commit and catalog
        id: live_verification
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          LIVE_VERIFY_ATTEMPTS: 24
          LIVE_VERIFY_INTERVAL_MS: 5000
        run: |
          node --experimental-strip-types scripts/validate-live-deployment.mjs "$PAGE_URL" "$GITHUB_SHA"

      - name: Publish live verification result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          VERIFY_OUTCOME: ${{ steps.live_verification.outcome }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$VERIFY_OUTCOME" = "success" ]; then
            state="success"
            description="Stable HTML, assets, deployment markers, and recipe manifest match"
          else
            state="failure"
            description="Deployment propagation or catalog integrity verification failed"
          fi

          payload="$(jq -n \
            --arg state "$state" \
            --arg target_url "$target_url" \
            --arg description "$description" \
            --arg context "github-pages/live-verification" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}')"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"

      - name: Fail job when live verification failed
        if: always() && (steps.deployment.outcome != 'success' || steps.live_verification.outcome != 'success')
        run: |
          echo "GitHub Pages deployment did not pass stable live verification."
          exit 1
