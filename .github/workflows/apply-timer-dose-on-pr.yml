name: Apply timer dose refactor on PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/timer-dose-state' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Apply refactor
        run: python scripts/apply-timer-dose-refactor.py
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate refactor
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          GITHUB_PAGES=true NEXT_PUBLIC_BASE_PATH=/brew NEXT_PUBLIC_DEPLOYMENT_SHA=${GITHUB_SHA} pnpm build:github
          pnpm run validate:static-export out
      - name: Commit refactor
        run: |
          rm .github/workflows/apply-timer-dose-refactor.yml
          rm .github/workflows/apply-timer-dose-on-pr.yml
          rm scripts/apply-timer-dose-refactor.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/page.tsx app/MobileRecipeEnhancer.tsx test/mobile-timer-input-and-nav.test.mjs e2e/mobile-flow.mjs .github/workflows/apply-timer-dose-refactor.yml .github/workflows/apply-timer-dose-on-pr.yml scripts/apply-timer-dose-refactor.py
          git commit -m "refactor: manage timer dose input with React state"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
