name: Research Anstar recipe video

on:
  push:
    branches: [refresh-recipe-catalog]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: |
          pnpm add --save-dev --lockfile=false playwright@1.55.0
          pnpm exec playwright install --with-deps chromium
      - name: Fetch official transcript
        run: python scripts/research-anstar-transcript.py
      - name: Probe official player clients
        run: python scripts/research-anstar-player.py
      - name: Inspect official video comments
        run: python scripts/research-anstar-comments.py
      - name: Probe official transcript in Chromium
        run: node scripts/research-anstar-browser.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: anstar-video-research-${{ github.run_id }}
          path: research
          retention-days: 3
