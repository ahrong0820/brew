name: Research Anstar recipe video

on:
  push:
    branches: [refresh-recipe-catalog]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Fetch official transcript
        run: python scripts/research-anstar-transcript.py
      - name: Probe official player clients
        run: python scripts/research-anstar-player.py
      - name: Inspect official video comments
        run: python scripts/research-anstar-comments.py
      - uses: actions/upload-artifact@v4
        with:
          name: anstar-video-research-${{ github.run_id }}
          path: research
          retention-days: 3
