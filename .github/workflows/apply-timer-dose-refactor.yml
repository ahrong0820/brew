name: Apply timer dose state refactor

on:
  push:
    branches:
      - refactor/timer-dose-state

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Refactor timer dose state and tests
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          page_path = Path('app/page.tsx')
          page = page_path.read_text()
          old_state = '  const [dose, setDose] = useState(recipes[0].dose);\n'
          new_state = old_state + '  const [doseInput, setDoseInput] = useState(String(recipes[0].dose));\n'
          assert old_state in page
          page = page.replace(old_state, new_state, 1)

          marker = '  const draftTotalTime = draftSteps.reduce(\n    (total, step) => total + clampNumber(step.duration, 5, 360),\n    0,\n  );\n\n'
          helpers = '''  function syncTimerDose(nextDose: number) {
    setDose(nextDose);
    setDoseInput(String(nextDose));
  }

  function updateTimerDoseInput(nextValue: string) {
    setDoseInput(nextValue);
    if (nextValue === "") {
      return;
    }

    const nextDose = Number(nextValue);
    if (Number.isFinite(nextDose) && nextDose >= 8 && nextDose <= 40) {
      setDose(nextDose);
    }
  }

  function commitTimerDoseInput() {
    const nextDose = clampNumber(Number(doseInput), 8, 40);
    syncTimerDose(nextDose);
  }

'''
          assert marker in page
          page = page.replace(marker, marker + helpers, 1)
          page = re.sub(r'(?<!\[dose, )setDose\(', 'syncTimerDose(', page)

          old_input = '''                  <input
                    type="number"
                    min="8"
                    max="40"
                    step="1"
                    value={dose}
                    onChange={(event) => {
                      const nextDose = Number(event.target.value);
                      if (Number.isFinite(nextDose)) {
                        syncTimerDose(clampNumber(nextDose, 8, 40));
                      }
                    }}
                    className="h-10 w-full rounded-md border border-[#d7ded4] bg-white px-3 text-lg font-semibold outline-none focus:border-[#2f6f5f] focus:ring-2 focus:ring-[#2f6f5f]/20"
                  />'''
          new_input = '''                  <input
                    type="number"
                    min="8"
                    max="40"
                    step="1"
                    value={doseInput}
                    data-timer-dose-input="true"
                    onChange={(event) => updateTimerDoseInput(event.target.value)}
                    onBlur={commitTimerDoseInput}
                    onKeyDown={(event) => {
                      if (event.key === "Enter") {
                        event.preventDefault();
                        commitTimerDoseInput();
                        event.currentTarget.blur();
                      }
                    }}
                    className="h-10 w-full rounded-md border border-[#d7ded4] bg-white px-3 text-lg font-semibold outline-none focus:border-[#2f6f5f] focus:ring-2 focus:ring-[#2f6f5f]/20"
                  />'''
          assert old_input in page
          page = page.replace(old_input, new_input, 1)
          page_path.write_text(page)

          enhancer_path = Path('app/MobileRecipeEnhancer.tsx')
          enhancer = enhancer_path.read_text()
          enhancer = re.sub(r'const timerDoseSelector.*?const timerDoseMax = 40;\n\n', '', enhancer, flags=re.S)
          enhancer = re.sub(r'function isValidTimerDose.*?function findTimerDoseInput\(timerPanel: HTMLElement \| null\) \{.*?\n\}\n\n', '', enhancer, flags=re.S)
          enhancer = enhancer.replace('    let editingDoseInput: HTMLInputElement | null = null;\n    let editingDoseDraft = "";\n    const lastValidDose = new WeakMap<HTMLInputElement, number>();\n', '')
          enhancer = re.sub(r'    function syncTimerDoseInput\(timerPanel: HTMLElement \| null\) \{.*?\n    \}\n\n', '', enhancer, flags=re.S)
          enhancer = enhancer.replace('      syncTimerDoseInput(timerPanel);\n', '')
          enhancer = re.sub(r'    function handleTimerDoseFocus\(event: FocusEvent\) \{.*?\n    function handleClick', '    function handleClick', enhancer, flags=re.S)
          enhancer = enhancer.replace('    document.addEventListener("focusin", handleTimerDoseFocus);\n', '')
          enhancer = enhancer.replace('    document.addEventListener("input", handleTimerDoseInput, true);\n', '')
          enhancer = enhancer.replace('    document.addEventListener("focusout", handleTimerDoseBlur);\n', '')
          enhancer = enhancer.replace('    const doseDraftInterval = window.setInterval(maintainTimerDoseDraft, 100);\n', '')
          enhancer = enhancer.replace('      window.clearInterval(doseDraftInterval);\n', '')
          enhancer = enhancer.replace('      document.removeEventListener("focusin", handleTimerDoseFocus);\n', '')
          enhancer = enhancer.replace('      document.removeEventListener("input", handleTimerDoseInput, true);\n', '')
          enhancer = enhancer.replace('      document.removeEventListener("focusout", handleTimerDoseBlur);\n', '')
          enhancer = re.sub(r'      document\n        \.querySelectorAll\(timerDoseSelector\)\n        \.forEach\(\(element\) => element\.removeAttribute\("data-timer-dose-input"\)\);\n', '', enhancer)
          for forbidden in ['setNativeInputValue', 'handleTimerDoseInput', 'doseDraftInterval', 'timerDoseSelector']:
            assert forbidden not in enhancer, forbidden
          enhancer_path.write_text(enhancer)

          unit = '''import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";
          import test from "node:test";

          const page = await readFile(new URL("../app/page.tsx", import.meta.url), "utf8");
          const enhancer = await readFile(
            new URL("../app/MobileRecipeEnhancer.tsx", import.meta.url),
            "utf8",
          );
          const mobileNav = await readFile(
            new URL("../app/MobileCoffeeNav.tsx", import.meta.url),
            "utf8",
          );

          test("timer dose input uses React draft and committed numeric state", () => {
            assert.match(page, /const \[doseInput, setDoseInput\] = useState/);
            assert.match(page, /value=\{doseInput\}/);
            assert.match(page, /data-timer-dose-input="true"/);
            assert.match(page, /nextValue === ""/);
            assert.match(page, /nextDose >= 8 && nextDose <= 40/);
            assert.match(page, /onBlur=\{commitTimerDoseInput\}/);
            assert.match(page, /event\.key === "Enter"/);
            assert.doesNotMatch(enhancer, /setNativeInputValue|handleTimerDoseInput|doseDraftInterval/);
          });

          test("mobile tools do not hide their own buttons and include personal recipes", () => {
            assert.match(mobileNav, /data-mobile-coffee-nav="true"/);
            assert.match(mobileNav, /button\.closest\(mobileNavRootSelector\)/);
            assert.match(mobileNav, /key: "personal-recipes", label: "개인 레시피"/);
            assert.match(mobileNav, /openLauncher\("personal-recipes"\)/);
            assert.match(mobileNav, /subscribeToBrewSessionClock\(syncActiveSession\)/);
          });
          '''
          Path('test/mobile-timer-input-and-nav.test.mjs').write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in unit.splitlines()) + '\n')

          e2e_path = Path('e2e/mobile-flow.mjs')
          e2e = e2e_path.read_text()
          pattern = re.compile(r'    const timerPanel = page\.locator\(\'\[data-timer-panel="true"\]\'\);.*?    assert\.equal\(await mobileNav\.count\(\), 0, "mobile navigation must stay hidden while paused"\);', re.S)
          replacement = '''    const timerPanel = page.locator('[data-timer-panel="true"]');
    await timerPanel.waitFor({ state: "attached" });
    const doseInput = timerPanel.locator('input[data-timer-dose-input="true"]');
    await doseInput.waitFor({ state: "visible" });

    await doseInput.fill("");
    await page.waitForTimeout(250);
    assert.equal(await doseInput.inputValue(), "", "blank dose must remain editable");

    await doseInput.fill("22");
    await page.waitForTimeout(150);
    assert.equal(await doseInput.inputValue(), "22", "valid dose must update immediately");
    await timerPanel.getByText("330g", { exact: true }).waitFor();
    await doseInput.press("Tab");
    assert.equal(await doseInput.inputValue(), "22", "valid dose must commit on blur");

    await doseInput.focus();
    await doseInput.fill("4");
    await page.waitForTimeout(150);
    assert.equal(await doseInput.inputValue(), "4", "partial low input must remain editable");
    await doseInput.press("Tab");
    await page.waitForTimeout(100);
    assert.equal(await doseInput.inputValue(), "8", "low dose must clamp on blur");

    await doseInput.focus();
    await doseInput.fill("45");
    await page.waitForTimeout(150);
    assert.equal(await doseInput.inputValue(), "45", "partial high input must remain editable");
    await doseInput.press("Enter");
    await page.waitForTimeout(100);
    assert.equal(await doseInput.inputValue(), "40", "high dose must clamp on Enter");

    const recipeRows = page.locator('[data-recipe-row="true"]');
    await waitForCount(recipeRows, 2);
    const fifteenGramRecipe = page.getByRole("button", { name: /용챔 라이트로스트 15g/ });
    await fifteenGramRecipe.click();
    await page.waitForTimeout(100);
    assert.equal(await doseInput.inputValue(), "15", "recipe selection must synchronize dose draft");

    const startButton = timerPanel.getByRole("button", { name: "시작", exact: true });
    await startButton.waitFor({ state: "visible" });
    await startButton.click();
    await timerPanel.getByRole("button", { name: "일시정지", exact: true }).waitFor();
    await mobileNav.waitFor({ state: "detached" });

    await timerPanel.getByRole("button", { name: "일시정지", exact: true }).click();
    await timerPanel.getByRole("button", { name: "시작", exact: true }).waitFor();
    assert.equal(await mobileNav.count(), 0, "mobile navigation must stay hidden while paused");'''
          e2e, count = pattern.subn(replacement, e2e, count=1)
          assert count == 1, count
          e2e = e2e.replace('E2E PASS: mobile tools, dose editing, recipe selection, and timer navigation', 'E2E PASS: React dose editing, recipe synchronization, mobile tools, and timer navigation')
          e2e_path.write_text(e2e)
          PY
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate changes
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          GITHUB_PAGES=true NEXT_PUBLIC_BASE_PATH=/brew NEXT_PUBLIC_DEPLOYMENT_SHA=${GITHUB_SHA} pnpm build:github
          pnpm run validate:static-export out
      - name: Commit refactor
        run: |
          rm .github/workflows/apply-timer-dose-refactor.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/page.tsx app/MobileRecipeEnhancer.tsx test/mobile-timer-input-and-nav.test.mjs e2e/mobile-flow.mjs .github/workflows/apply-timer-dose-refactor.yml
          git commit -m "refactor: manage timer dose input with React state"
          git push origin HEAD:refactor/timer-dose-state
