name: Apply active brew discard integration

on:
  push:
    branches:
      - feat/discard-active-brew

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/discard-active-brew
          fetch-depth: 0

      - name: Apply integration
        run: node scripts/apply-active-brew-discard.mjs

      - name: Remove one-time files
        run: |
          rm scripts/apply-active-brew-discard.mjs
          rm .github/workflows/apply-active-brew-discard.yml

      - name: Commit integrated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/BrewHistoryDrawer.tsx app/BrewSessionFeedbackTracker.tsx lib/brew/activeBrewDiscard.ts lib/brew/sessionManagement.ts test/brew-session-clock.test.mjs scripts/apply-active-brew-discard.mjs .github/workflows/apply-active-brew-discard.yml
          git commit -m "feat: add active brew cancel and discard flow"
          git push origin HEAD:feat/discard-active-brew
