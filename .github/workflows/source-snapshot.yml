name: Source snapshot

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: |
            .
            !node_modules
            !.git
          include-hidden-files: true
          retention-days: 1
