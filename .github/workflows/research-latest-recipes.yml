name: Research latest recipe sources

on:
  push:
    branches:
      - refresh-recipe-catalog
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch official candidate metadata
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p research/pages
          cat > research/video-ids.txt <<'EOF'
          Q3CbFCF5CD4
          i7Q-pvahrXw
          bVh1yP9imQk
          JWHanqQ5MsQ
          4p597xbd-ns
          60vTtLWWztA
          uZs78TPm7ws
          ewqza63GXh0
          k0YQ8vKRD4s
          wmCW8xSWGZY
          lJNPp-onikk
          k0nsShguOsU
          gC8K40kZ_6E
          EOF
          while read -r id; do
            curl -L --fail --retry 2 \
              -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
              "https://www.youtube.com/watch?v=${id}&hl=ko" \
              -o "research/pages/${id}.html" || true
            curl -L --fail --retry 2 \
              "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json" \
              -o "research/pages/${id}.oembed.json" || true
          done < research/video-ids.txt

      - name: Build compact report
        shell: bash
        run: |
          python - <<'PY'
          import html
          import json
          import re
          from pathlib import Path

          def decode_js_string(value):
              try:
                  return json.loads('"' + value.replace('"', '\\"') + '"')
              except Exception:
                  return html.unescape(value.replace('\\n', '\n').replace('\\u0026', '&'))

          def field(text, key):
              match = re.search(r'"' + re.escape(key) + r'":"((?:\\.|[^"\\])*)"', text)
              return decode_js_string(match.group(1)) if match else ''

          lines=[]
          for id_path in Path('research/video-ids.txt').read_text().splitlines():
              video_id=id_path.strip()
              page_path=Path(f'research/pages/{video_id}.html')
              page=page_path.read_text(errors='ignore') if page_path.exists() else ''
              oembed_path=Path(f'research/pages/{video_id}.oembed.json')
              try:
                  oembed=json.loads(oembed_path.read_text()) if oembed_path.exists() else {}
              except Exception:
                  oembed={}
              title=oembed.get('title') or field(page, 'title')
              author=oembed.get('author_name') or field(page, 'ownerChannelName')
              description=field(page, 'shortDescription')
              publish_date=field(page, 'publishDate')
              upload_date=field(page, 'uploadDate')
              channel_id=field(page, 'channelId')
              lines.extend([
                  '='*80,
                  f'id: {video_id}',
                  f'title: {title}',
                  f'channel: {author}',
                  f'channel_id: {channel_id}',
                  f'publish_date: {publish_date}',
                  f'upload_date: {upload_date}',
                  f'url: https://www.youtube.com/watch?v={video_id}',
                  'description:',
                  description,
              ])
          Path('research/report.txt').write_text('\n'.join(lines))
          PY

      - name: Upload research
        uses: actions/upload-artifact@v4
        with:
          name: latest-recipe-research-${{ github.run_id }}
          path: research
          retention-days: 3
