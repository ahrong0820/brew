name: Research latest recipe sources

on:
  push:
    branches:
      - refresh-recipe-catalog
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: python -m pip install yt-dlp

      - name: Fetch official candidate metadata
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p research/videos
          cat > research/video-ids.txt <<'EOF'
          Q3CbFCF5CD4
          i7Q-pvahrXw
          bVh1yP9imQk
          JWHanqQ5MsQ
          4p597xbd-ns
          60vTtLWWztA
          uZs78TPm7ws
          ewqza63GXh0
          k0YQ8vKRD4s
          wmCW8xSWGZY
          lJNPp-onikk
          k0nsShguOsU
          gC8K40kZ_6E
          EOF
          while read -r id; do
            yt-dlp "https://www.youtube.com/watch?v=${id}" \
              --skip-download \
              --write-description \
              --write-info-json \
              --output "research/videos/%(id)s.%(ext)s" || true
          done < research/video-ids.txt

      - name: Build compact report
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          lines=[]
          for path in sorted(Path('research/videos').glob('*.info.json')):
              data=json.loads(path.read_text())
              lines.extend([
                  '='*80,
                  f"id: {data.get('id')}",
                  f"title: {data.get('title')}",
                  f"channel: {data.get('channel')}",
                  f"channel_id: {data.get('channel_id')}",
                  f"upload_date: {data.get('upload_date')}",
                  f"timestamp: {data.get('timestamp')}",
                  f"webpage_url: {data.get('webpage_url')}",
                  'description:',
                  data.get('description') or '',
              ])
          Path('research/report.txt').write_text('\n'.join(lines))
          PY

      - name: Upload research
        uses: actions/upload-artifact@v4
        with:
          name: latest-recipe-research-${{ github.run_id }}
          path: research
          retention-days: 3
