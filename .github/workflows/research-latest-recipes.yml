name: Research latest recipe sources

on:
  push:
    branches:
      - refresh-recipe-catalog
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Query public video API mirrors
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p research/videos research/captions
          ids=(Q3CbFCF5CD4 60vTtLWWztA uZs78TPm7ws i7Q-pvahrXw JWHanqQ5MsQ k0nsShguOsU)
          instances=(
            https://inv.nadeko.net
            https://invidious.nerdvpn.de
            https://invidious.tiekoetter.com
            https://invidious.f5.si
            https://inv.zoomerville.com
          )
          : > research/mirror-log.txt
          for id in "${ids[@]}"; do
            for instance in "${instances[@]}"; do
              echo "${id} ${instance}" >> research/mirror-log.txt
              if curl -L --fail --connect-timeout 10 --max-time 30 \
                -A 'Mozilla/5.0' \
                "${instance}/api/v1/videos/${id}" \
                -o "research/videos/${id}.json" 2>> research/mirror-log.txt; then
                echo "SUCCESS ${id} ${instance}" >> research/mirror-log.txt
                python - "$id" "$instance" <<'PY'
          import json, sys, urllib.parse
          from pathlib import Path
          video_id, instance = sys.argv[1:]
          path = Path(f'research/videos/{video_id}.json')
          data = json.loads(path.read_text())
          data['_mirror'] = instance
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2))
          PY
                break
              fi
            done
          done

      - name: Download available captions
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path
          for path in Path('research/videos').glob('*.json'):
              data=json.loads(path.read_text())
              video_id=path.stem
              mirror=data.get('_mirror','')
              for index, caption in enumerate(data.get('captions') or []):
                  label=caption.get('label') or caption.get('languageCode') or caption.get('name') or ''
                  url=caption.get('url') or caption.get('baseUrl') or ''
                  if url.startswith('/'):
                      url=mirror+url
                  if not url and mirror and label:
                      from urllib.parse import quote
                      url=f'{mirror}/api/v1/captions/{video_id}?label={quote(str(label))}'
                  if not url:
                      continue
                  output=Path(f'research/captions/{video_id}-{index}.txt')
                  result=subprocess.run(
                      ['curl','-L','--fail','--connect-timeout','10','--max-time','30','-A','Mozilla/5.0',url],
                      capture_output=True,
                  )
                  if result.returncode == 0:
                      output.write_bytes(result.stdout)
                  else:
                      output.with_suffix('.error.txt').write_bytes(result.stderr)
          PY

      - name: Build compact report
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          lines=[]
          for path in sorted(Path('research/videos').glob('*.json')):
              data=json.loads(path.read_text())
              lines.extend([
                  '='*80,
                  f'id: {path.stem}',
                  f'mirror: {data.get("_mirror")}',
                  f'title: {data.get("title")}',
                  f'author: {data.get("author")}',
                  f'authorId: {data.get("authorId")}',
                  f'published: {data.get("published")}',
                  f'lengthSeconds: {data.get("lengthSeconds")}',
                  f'captions: {json.dumps(data.get("captions") or [], ensure_ascii=False)}',
                  'description:',
                  data.get('description') or '',
              ])
              for caption in sorted(Path('research/captions').glob(f'{path.stem}-*.txt')):
                  lines.extend([f'caption_file: {caption.name}', caption.read_text(errors='ignore')])
          lines.extend(['='*80, 'mirror_log:', Path('research/mirror-log.txt').read_text(errors='ignore')])
          Path('research/report.txt').write_text('\n'.join(lines))
          PY

      - name: Upload research
        uses: actions/upload-artifact@v4
        with:
          name: latest-recipe-research-${{ github.run_id }}
          path: research
          retention-days: 3
