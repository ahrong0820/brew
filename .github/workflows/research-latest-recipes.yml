name: Research latest recipe sources

on:
  push:
    branches:
      - refresh-recipe-catalog
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch player metadata and captions
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          video_ids = [
              'Q3CbFCF5CD4',
              '60vTtLWWztA',
              'uZs78TPm7ws',
              'i7Q-pvahrXw',
              'JWHanqQ5MsQ',
              'k0nsShguOsU',
          ]
          base = Path('research')
          pages = base / 'pages'
          players = base / 'players'
          captions = base / 'captions'
          for directory in [pages, players, captions]:
              directory.mkdir(parents=True, exist_ok=True)

          user_agent = 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36'

          def request_json(url, body=None, headers=None):
              request = urllib.request.Request(
                  url,
                  data=json.dumps(body).encode() if body is not None else None,
                  headers=headers or {},
                  method='POST' if body is not None else 'GET',
              )
              try:
                  with urllib.request.urlopen(request, timeout=40) as response:
                      return {'status': response.status, 'body': json.loads(response.read())}
              except urllib.error.HTTPError as exc:
                  return {'status': exc.code, 'errorBody': exc.read().decode(errors='ignore')}
              except Exception as exc:
                  return {'status': 0, 'error': repr(exc)}

          for video_id in video_ids:
              page_request = urllib.request.Request(
                  f'https://www.youtube.com/watch?v={video_id}&hl=ko',
                  headers={'User-Agent': user_agent},
              )
              with urllib.request.urlopen(page_request, timeout=40) as response:
                  page = response.read().decode(errors='ignore')
              (pages / f'{video_id}.html').write_text(page)

              def match(pattern):
                  found = re.search(pattern, page)
                  return found.group(1) if found else ''

              api_key = match(r'"INNERTUBE_API_KEY":"([^"]+)"')
              client_version = match(r'"INNERTUBE_CLIENT_VERSION":"([^"]+)"')
              visitor_data = match(r'"VISITOR_DATA":"([^"]+)"')
              headers = {
                  'Content-Type': 'application/json',
                  'User-Agent': user_agent,
                  'Origin': 'https://www.youtube.com',
                  'Referer': f'https://www.youtube.com/watch?v={video_id}',
                  'X-Youtube-Client-Name': '1',
                  'X-Youtube-Client-Version': client_version,
                  'X-Goog-Visitor-Id': visitor_data,
              }
              body = {
                  'context': {
                      'client': {
                          'clientName': 'WEB',
                          'clientVersion': client_version,
                          'hl': 'ko',
                          'gl': 'KR',
                          'visitorData': visitor_data,
                      },
                      'request': {'useSsl': True},
                  },
                  'videoId': video_id,
                  'contentCheckOk': True,
                  'racyCheckOk': True,
              }
              result = request_json(
                  f'https://www.youtube.com/youtubei/v1/player?key={api_key}&prettyPrint=false',
                  body,
                  headers,
              )
              (players / f'{video_id}.json').write_text(
                  json.dumps(result, ensure_ascii=False, indent=2)
              )
              payload = result.get('body', {})
              tracks = (
                  payload.get('captions', {})
                  .get('playerCaptionsTracklistRenderer', {})
                  .get('captionTracks', [])
              )
              for index, track in enumerate(tracks):
                  url = track.get('baseUrl')
                  if not url:
                      continue
                  caption_request = urllib.request.Request(
                      url + ('&' if '?' in url else '?') + 'fmt=json3',
                      headers={'User-Agent': user_agent},
                  )
                  try:
                      with urllib.request.urlopen(caption_request, timeout=40) as response:
                          raw = response.read()
                      (captions / f'{video_id}-{index}.json').write_bytes(raw)
                  except Exception as exc:
                      (captions / f'{video_id}-{index}.error.txt').write_text(repr(exc))

          lines=[]
          for video_id in video_ids:
              result=json.loads((players / f'{video_id}.json').read_text())
              payload=result.get('body', {})
              details=payload.get('videoDetails', {})
              status=payload.get('playabilityStatus', {})
              tracks=(payload.get('captions', {})
                      .get('playerCaptionsTracklistRenderer', {})
                      .get('captionTracks', []))
              lines.extend([
                  '='*80,
                  f'id: {video_id}',
                  f'http_status: {result.get("status")}',
                  f'playability: {status.get("status")} {status.get("reason", "")}',
                  f'title: {details.get("title", "")}',
                  f'author: {details.get("author", "")}',
                  f'length_seconds: {details.get("lengthSeconds", "")}',
                  f'caption_tracks: {len(tracks)}',
              ])
              for index, track in enumerate(tracks):
                  name=''.join(run.get('text','') for run in track.get('name',{}).get('runs',[]))
                  lines.append(f'caption_{index}: {track.get("languageCode")} {name} {track.get("kind", "")}')
                  caption_path=captions / f'{video_id}-{index}.json'
                  if caption_path.exists():
                      try:
                          caption_json=json.loads(caption_path.read_text())
                          transcript=[]
                          for event in caption_json.get('events', []):
                              text=''.join(segment.get('utf8','') for segment in event.get('segs', []))
                              if text.strip():
                                  transcript.append(f'{event.get("tStartMs",0)}\t{text.strip()}')
                          lines.extend(['transcript:', '\n'.join(transcript)])
                      except Exception as exc:
                          lines.append(f'caption_parse_error: {exc!r}')
              if result.get('errorBody'):
                  lines.append('error_body: '+result['errorBody'])
              if result.get('error'):
                  lines.append('error: '+result['error'])
          (base / 'player-report.txt').write_text('\n'.join(lines))
          PY

      - name: Upload research
        uses: actions/upload-artifact@v4
        with:
          name: latest-recipe-research-${{ github.run_id }}
          path: research
          retention-days: 3
