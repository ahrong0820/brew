name: Research latest recipe sources

on:
  push:
    branches:
      - refresh-recipe-catalog
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: python -m pip install yt-dlp

      - name: Search official recipe videos
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p research
          queries=(
            "정인성의 커피생활 국룰 레시피 V60"
            "정인성 4666 커피 레시피"
            "정인성 클레버 레시피"
            "안스타 6888 커피 레시피"
            "안스타 핸드드립 레시피 최신"
            "Tetsu Kasuya 4:6 method official"
            "Tetsu Kasuya latest V60 recipe"
          )
          : > research/search-results.txt
          for query in "${queries[@]}"; do
            echo "===== ${query} =====" | tee -a research/search-results.txt
            yt-dlp "ytsearch12:${query}" --flat-playlist --print '%(id)s\t%(title)s\t%(channel)s\t%(channel_id)s\t%(timestamp)s\t%(webpage_url)s' 2>&1 | tee -a research/search-results.txt || true
          done

      - name: Fetch candidate metadata
        shell: bash
        run: |
          set -uo pipefail
          awk -F '\t' 'NF >= 6 && $1 ~ /^[A-Za-z0-9_-]{11}$/ {print $1}' research/search-results.txt | sort -u > research/video-ids.txt
          mkdir -p research/videos
          while read -r id; do
            yt-dlp "https://www.youtube.com/watch?v=${id}" --skip-download --write-description --write-info-json --output "research/videos/%(id)s.%(ext)s" || true
          done < research/video-ids.txt

      - name: Upload research
        uses: actions/upload-artifact@v4
        with:
          name: latest-recipe-research-${{ github.run_id }}
          path: research
          retention-days: 3
