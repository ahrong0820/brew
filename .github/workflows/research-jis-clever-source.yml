name: Research JIS Clever source

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  collect-source:
    if: github.head_ref == 'feat/jis-clever-1-11'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install source tools
        run: python -m pip install --disable-pip-version-check yt-dlp youtube-transcript-api requests
      - name: Collect first-party video evidence
        continue-on-error: true
        run: |
          mkdir -p source-research
          set +e

          curl -L --fail --silent --show-error \
            'https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=JWHanqQ5MsQ&format=json' \
            -o source-research/oembed.json \
            2> source-research/oembed-error.txt

          curl -L --fail --silent --show-error \
            'https://www.youtube.com/watch?v=JWHanqQ5MsQ&hl=ko' \
            -o source-research/watch.html \
            2> source-research/watch-error.txt

          python - <<'PY' > source-research/innertube-output.txt 2> source-research/innertube-error.txt
          from pathlib import Path
          import json
          import requests

          text = Path('source-research/watch.html').read_text(errors='replace')

          def extract_object(marker: str):
              start = text.find(marker)
              if start < 0:
                  raise RuntimeError(f'missing marker: {marker}')
              start = text.find('{', start + len(marker))
              depth = 0
              in_string = False
              escaped = False
              for index in range(start, len(text)):
                  char = text[index]
                  if in_string:
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == '"':
                          in_string = False
                  else:
                      if char == '"':
                          in_string = True
                      elif char == '{':
                          depth += 1
                      elif char == '}':
                          depth -= 1
                          if depth == 0:
                              return json.loads(text[start:index + 1])
              raise RuntimeError(f'unterminated object: {marker}')

          config = extract_object('ytcfg.set(')
          initial = extract_object('var ytInitialData = ')
          params = None
          for panel in initial.get('engagementPanels', []):
              renderer = panel.get('engagementPanelSectionListRenderer', {})
              if renderer.get('panelIdentifier') != 'engagement-panel-searchable-transcript':
                  continue
              endpoint = (
                  renderer.get('content', {})
                  .get('continuationItemRenderer', {})
                  .get('continuationEndpoint', {})
                  .get('getTranscriptEndpoint', {})
              )
              params = endpoint.get('params')
              break
          if not params:
              raise RuntimeError('transcript continuation params missing')

          context = config['INNERTUBE_CONTEXT']
          client = context['client']
          response = requests.post(
              f"https://www.youtube.com/youtubei/v1/get_transcript?key={config['INNERTUBE_API_KEY']}",
              headers={
                  'Content-Type': 'application/json',
                  'User-Agent': client.get('userAgent', 'Mozilla/5.0'),
                  'X-Youtube-Client-Name': '1',
                  'X-Youtube-Client-Version': client['clientVersion'],
                  'X-Goog-Visitor-Id': client.get('visitorData', ''),
                  'Origin': 'https://www.youtube.com',
              },
              json={'context': context, 'params': params},
              timeout=30,
          )
          Path('source-research/transcript-response.json').write_text(response.text)
          response.raise_for_status()
          payload = response.json()

          lines = []
          def walk(value):
              if isinstance(value, dict):
                  segment = value.get('transcriptSegmentRenderer')
                  if segment:
                      start_ms = int(segment.get('startMs', 0))
                      runs = segment.get('snippet', {}).get('runs', [])
                      content = ''.join(run.get('text', '') for run in runs)
                      lines.append(f"{start_ms / 1000:.2f}\t{content}")
                  for child in value.values():
                      walk(child)
              elif isinstance(value, list):
                  for child in value:
                      walk(child)
          walk(payload)
          Path('source-research/transcript-innertube.txt').write_text('\n'.join(lines))
          print(f'extracted {len(lines)} transcript segments')
          PY

          yt-dlp \
            --skip-download \
            --write-auto-subs \
            --write-subs \
            --sub-langs 'ko.*,ko,en.*' \
            --sub-format vtt \
            --write-info-json \
            --output 'source-research/%(id)s.%(ext)s' \
            'https://youtu.be/JWHanqQ5MsQ' \
            > source-research/yt-dlp-output.txt \
            2> source-research/yt-dlp-error.txt

          python - <<'PY' > source-research/transcript-output.txt 2> source-research/transcript-error.txt
          from pathlib import Path
          from youtube_transcript_api import YouTubeTranscriptApi

          transcript = YouTubeTranscriptApi().fetch('JWHanqQ5MsQ', languages=['ko', 'en'])
          Path('source-research/transcript.txt').write_text(
              '\n'.join(f"{item.start:.2f}\t{item.text}" for item in transcript),
          )
          PY

          python - <<'PY' > source-research/parse-output.txt 2> source-research/parse-error.txt
          from pathlib import Path
          import html
          import json
          import re

          source = Path('source-research')
          summary = {}
          info_paths = list(source.glob('*.info.json'))
          if info_paths:
              info = json.loads(info_paths[0].read_text())
              summary.update({
                  'id': info.get('id'),
                  'title': info.get('title'),
                  'channel': info.get('channel'),
                  'channel_id': info.get('channel_id'),
                  'channel_url': info.get('channel_url'),
                  'uploader': info.get('uploader'),
                  'upload_date': info.get('upload_date'),
                  'duration': info.get('duration'),
                  'description': info.get('description'),
                  'webpage_url': info.get('webpage_url'),
                  'subtitles': sorted((info.get('subtitles') or {}).keys()),
                  'automatic_captions': sorted((info.get('automatic_captions') or {}).keys()),
              })

          oembed = source / 'oembed.json'
          if oembed.exists() and oembed.stat().st_size:
              summary['oembed'] = json.loads(oembed.read_text())

          watch = source / 'watch.html'
          if watch.exists() and watch.stat().st_size:
              text = watch.read_text(errors='replace')
              for key, pattern in {
                  'html_title': r'<title>(.*?)</title>',
                  'owner_channel_name': r'"ownerChannelName":"(.*?)"',
                  'publish_date': r'"publishDate":"(.*?)"',
                  'length_seconds': r'"lengthSeconds":"(.*?)"',
              }.items():
                  match = re.search(pattern, text)
                  if match:
                      summary[key] = html.unescape(match.group(1)).encode().decode('unicode_escape')

              marker = '"attributedDescriptionBodyText":{"content":"'
              start = text.find(marker)
              if start >= 0:
                  start += len(marker)
                  end = start
                  escaped = False
                  while end < len(text):
                      char = text[end]
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == '"':
                          break
                      end += 1
                  summary['description_from_watch'] = json.loads('"' + text[start:end] + '"')

          (source / 'metadata-summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
          )
          PY

          find source-research -maxdepth 1 -type f -printf '%f %s bytes\n' \
            | sort > source-research/file-list.txt
          exit 0
      - name: Upload source research
        uses: actions/upload-artifact@v4
        with:
          name: jis-clever-source-${{ github.run_id }}
          path: source-research
          if-no-files-found: error
          retention-days: 3
