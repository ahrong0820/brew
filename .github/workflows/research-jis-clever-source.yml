name: Research JIS Clever source

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  collect-source:
    if: github.head_ref == 'feat/jis-clever-1-11'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install source tools
        run: python -m pip install --disable-pip-version-check yt-dlp youtube-transcript-api
      - name: Collect first-party video evidence
        continue-on-error: true
        run: |
          mkdir -p source-research
          set +e

          curl -L --fail --silent --show-error \
            'https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=JWHanqQ5MsQ&format=json' \
            -o source-research/oembed.json \
            2> source-research/oembed-error.txt

          curl -L --fail --silent --show-error \
            'https://www.youtube.com/watch?v=JWHanqQ5MsQ&hl=ko' \
            -o source-research/watch.html \
            2> source-research/watch-error.txt

          yt-dlp \
            --skip-download \
            --write-auto-subs \
            --write-subs \
            --sub-langs 'ko.*,ko,en.*' \
            --sub-format vtt \
            --write-info-json \
            --output 'source-research/%(id)s.%(ext)s' \
            'https://youtu.be/JWHanqQ5MsQ' \
            > source-research/yt-dlp-output.txt \
            2> source-research/yt-dlp-error.txt

          python - <<'PY' > source-research/transcript-output.txt 2> source-research/transcript-error.txt
          from pathlib import Path
          from youtube_transcript_api import YouTubeTranscriptApi

          transcript = YouTubeTranscriptApi().fetch('JWHanqQ5MsQ', languages=['ko', 'en'])
          Path('source-research/transcript.txt').write_text(
              '\n'.join(f"{item.start:.2f}\t{item.text}" for item in transcript),
          )
          PY

          python - <<'PY' > source-research/parse-output.txt 2> source-research/parse-error.txt
          from pathlib import Path
          import html
          import json
          import re

          source = Path('source-research')
          summary = {}
          info_paths = list(source.glob('*.info.json'))
          if info_paths:
              info = json.loads(info_paths[0].read_text())
              summary.update({
                  'id': info.get('id'),
                  'title': info.get('title'),
                  'channel': info.get('channel'),
                  'channel_id': info.get('channel_id'),
                  'channel_url': info.get('channel_url'),
                  'uploader': info.get('uploader'),
                  'upload_date': info.get('upload_date'),
                  'duration': info.get('duration'),
                  'description': info.get('description'),
                  'webpage_url': info.get('webpage_url'),
                  'subtitles': sorted((info.get('subtitles') or {}).keys()),
                  'automatic_captions': sorted((info.get('automatic_captions') or {}).keys()),
              })

          oembed = source / 'oembed.json'
          if oembed.exists() and oembed.stat().st_size:
              summary['oembed'] = json.loads(oembed.read_text())

          watch = source / 'watch.html'
          if watch.exists() and watch.stat().st_size:
              text = watch.read_text(errors='replace')
              for key, pattern in {
                  'html_title': r'<title>(.*?)</title>',
                  'owner_channel_name': r'"ownerChannelName":"(.*?)"',
                  'short_description': r'"shortDescription":"(.*?)"',
                  'publish_date': r'"publishDate":"(.*?)"',
                  'length_seconds': r'"lengthSeconds":"(.*?)"',
              }.items():
                  match = re.search(pattern, text)
                  if match:
                      summary[key] = html.unescape(match.group(1)).encode().decode('unicode_escape')

          (source / 'metadata-summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
          )
          PY

          find source-research -maxdepth 1 -type f -printf '%f %s bytes\n' \
            | sort > source-research/file-list.txt
          exit 0
      - name: Upload source research
        uses: actions/upload-artifact@v4
        with:
          name: jis-clever-source-${{ github.run_id }}
          path: source-research
          if-no-files-found: error
          retention-days: 3
