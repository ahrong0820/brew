name: Apply audit remediation

on:
  pull_request:
    branches: ["main"]
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: apply-audit-remediation
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/full-audit-remediation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@v7
        with:
          ref: fix/full-audit-remediation
          fetch-depth: 0

      - name: Reconstruct and verify patch
        run: |
          cat .github/remediation.part.* > /tmp/remediation.patch.gz.b64
          echo "9f481c4e75c1c4d7d4786ec176cbf4f65f8e2ba65f5e53b8bf25521c51b70d5f  /tmp/remediation.patch.gz.b64" | sha256sum --check
          base64 --decode /tmp/remediation.patch.gz.b64 | gunzip > /tmp/remediation.patch
          echo "9002a024c8e2850594ae57d7a6a911c5cbff3c2b1d2c01b0cec3b7ecd9e3d285  /tmp/remediation.patch" | sha256sum --check

      - name: Build final non-workflow commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git am --3way /tmp/remediation.patch
          git reset --soft origin/fix/full-audit-remediation
          git restore --source=origin/fix/full-audit-remediation --staged --worktree .github/workflows .github/remediation.part.00 .github/remediation.part.01 .github/remediation.part.02 .github/remediation.part.03 .github/remediation.part.04 .github/remediation.part.05
          git commit -m "fix: complete independent audit remediation"
          git push origin HEAD:fix/full-audit-remediation
