name: Capture typecheck errors

on:
  push:
    branches:
      - feat/split-hot-iced-personalization

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/split-hot-iced-personalization
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck output
        run: pnpm typecheck > typecheck-errors.txt 2>&1 || true
      - name: Remove diagnostic workflow
        run: rm .github/workflows/capture-typecheck-errors.yml
      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add typecheck-errors.txt .github/workflows/capture-typecheck-errors.yml
          git commit -m "chore: capture typecheck diagnostics"
          git push origin HEAD:feat/split-hot-iced-personalization
