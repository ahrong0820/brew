name: Apply brew session page integration

on:
  push:
    branches:
      - feat/unify-brew-session-timer

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/unify-brew-session-timer
          fetch-depth: 0

      - name: Apply focused page changes
        run: node scripts/apply-brew-session-page-integration.mjs

      - name: Remove one-time migration files
        run: |
          rm scripts/apply-brew-session-page-integration.mjs
          rm .github/workflows/apply-brew-session-page-integration.yml

      - name: Commit integrated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx scripts/apply-brew-session-page-integration.mjs .github/workflows/apply-brew-session-page-integration.yml
          git commit -m "feat: connect main timer to shared brew session clock"
          git push origin HEAD:feat/unify-brew-session-timer
