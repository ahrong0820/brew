name: Apply mobile compact recipe update

on:
  push:
    branches:
      - feat/mobile-compact-recipe-list
    paths:
      - .github/workflows/apply-mobile-compact.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mobile-compact-recipe-list
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update mobile recipe interface
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          path = Path("app/page.tsx")
          source = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 match, found {count}")
              source = source.replace(old, new, 1)

          replace_once(
              "  ChevronLeft,\n  Check,",
              "  ChevronLeft,\n  ChevronRight,\n  Check,",
              "ChevronRight import",
          )

          replace_once(
              "  const [alertsEnabled, setAlertsEnabled] = useState(true);\n",
              "  const [alertsEnabled, setAlertsEnabled] = useState(true);\n"
              "  const [isCustomEditorOpen, setIsCustomEditorOpen] = useState(false);\n",
              "custom editor state",
          )

          replace_once(
              "  const completionPlayedRef = useRef(false);\n",
              "  const completionPlayedRef = useRef(false);\n"
              "  const timerSectionRef = useRef<HTMLElement | null>(null);\n",
              "timer section ref",
          )

          replace_once(
              "  function selectRecipe(recipe: Recipe) {\n"
              "    setSelectedId(recipe.id);\n"
              "    setDose(recipe.dose);\n"
              "    updateElapsed(0);\n"
              "    setRunning(false);\n"
              "  }",
              "  function selectRecipe(recipe: Recipe) {\n"
              "    setSelectedId(recipe.id);\n"
              "    setDose(recipe.dose);\n"
              "    updateElapsed(0);\n"
              "    setRunning(false);\n\n"
              "    if (window.matchMedia(\"(max-width: 1023px)\").matches) {\n"
              "      const prefersReducedMotion = window.matchMedia(\n"
              "        \"(prefers-reduced-motion: reduce)\",\n"
              "      ).matches;\n\n"
              "      window.requestAnimationFrame(() => {\n"
              "        timerSectionRef.current?.scrollIntoView({\n"
              "          behavior: prefersReducedMotion ? \"auto\" : \"smooth\",\n"
              "          block: \"start\",\n"
              "        });\n"
              "      });\n"
              "    }\n"
              "  }",
              "mobile timer scroll",
          )

          replace_once(
              "    setFilter(\"나만의 레시피\");\n"
              "    updateElapsed(0);\n"
              "    setRunning(false);\n"
              "  }",
              "    setFilter(\"나만의 레시피\");\n"
              "    updateElapsed(0);\n"
              "    setRunning(false);\n"
              "    setIsCustomEditorOpen(false);\n"
              "  }",
              "collapse editor after save",
          )

          replace_once(
              '<section className="order-2 min-w-0 space-y-5 lg:order-1">',
              '<section className="order-1 min-w-0 space-y-5">',
              "mobile content order",
          )

          replace_once(
              '<aside className="order-1 min-w-0 space-y-4 lg:sticky lg:top-6 lg:order-2 lg:self-start">',
              '<aside ref={timerSectionRef} className="order-2 min-w-0 scroll-mt-4 space-y-4 lg:sticky lg:top-6 lg:self-start">',
              "timer aside ref and order",
          )

          recipe_list_pattern = re.compile(
              r'          <div className="grid gap-4 md:grid-cols-2">\n.*?\n'
              r'          </div>\n\n'
              r'          <section className="rounded-lg border border-\[#d7ded4\] bg-white p-5 shadow-sm shadow-black/5">',
              re.DOTALL,
          )
          recipe_list_replacement = '''          <div className="overflow-hidden rounded-lg border border-[#d7ded4] bg-white shadow-sm shadow-black/5">
            {filteredRecipes.length > 0 ? (
              filteredRecipes.map((recipe) => {
                const selected = recipe.id === selectedRecipe.id;
                const favorite = favoriteIds.includes(recipe.id);

                return (
                  <button
                    key={recipe.id}
                    type="button"
                    onClick={() => selectRecipe(recipe)}
                    aria-current={selected ? "true" : undefined}
                    className={`flex w-full min-w-0 items-center gap-3 border-b border-[#e3e8df] px-3 py-3 text-left transition last:border-b-0 sm:px-4 ${
                      selected
                        ? "bg-[#eef5ef]"
                        : "bg-white hover:bg-[#f8faf6]"
                    }`}
                  >
                    <span
                      className={`h-8 w-1 shrink-0 rounded-full ${
                        selected ? "bg-[#2f6f5f]" : "bg-transparent"
                      }`}
                      aria-hidden="true"
                    />
                    <Heart
                      className={`h-4 w-4 shrink-0 ${
                        favorite
                          ? "fill-[#c95b3d] text-[#c95b3d]"
                          : "text-[#9aa49b]"
                      }`}
                      aria-label={favorite ? "즐겨찾기" : undefined}
                      aria-hidden={favorite ? undefined : "true"}
                    />
                    <span className="min-w-0 flex-1">
                      <strong className="block truncate text-[15px] font-semibold text-[#1d211c]">
                        {recipe.name}
                      </strong>
                      <span className="mt-0.5 block truncate text-xs text-[#607064]">
                        {recipe.method} · {recipe.dose}g · {formatWaterAmount(recipe.finalWater ?? recipe.water)}
                      </span>
                    </span>
                    <span className="shrink-0 rounded-md bg-[#eef3ec] px-2 py-1 font-mono text-xs text-[#2f6f5f]">
                      {formatTime(recipe.totalTime)}
                    </span>
                    <ChevronRight className="h-4 w-4 shrink-0 text-[#607064]" aria-hidden="true" />
                  </button>
                );
              })
            ) : (
              <p className="px-4 py-8 text-center text-sm text-[#607064]">
                조건에 맞는 레시피가 없습니다.
              </p>
            )}
          </div>

          <section className="rounded-lg border border-[#d7ded4] bg-white p-5 shadow-sm shadow-black/5">'''
          source, count = recipe_list_pattern.subn(recipe_list_replacement, source, count=1)
          if count != 1:
              raise RuntimeError(f"compact recipe list: expected 1 match, found {count}")

          replace_once(
              '            <div className="mt-4 grid gap-3 md:grid-cols-2">',
              '''            <button
              type="button"
              onClick={() => setIsCustomEditorOpen((current) => !current)}
              aria-expanded={isCustomEditorOpen}
              className="mt-4 flex h-11 w-full items-center justify-center gap-2 rounded-md border border-[#2f6f5f] bg-[#eef5ef] px-4 text-sm font-semibold text-[#2f6f5f] transition hover:bg-[#e1eee5]"
            >
              <Plus
                className={`h-4 w-4 transition ${isCustomEditorOpen ? "rotate-45" : ""}`}
                aria-hidden="true"
              />
              {isCustomEditorOpen ? "편집기 닫기" : "나만의 레시피 만들기"}
            </button>

            <div
              className={`${isCustomEditorOpen ? "grid" : "hidden"} mt-4 gap-3 md:grid-cols-2`}
            >''',
              "custom editor toggle",
          )

          replace_once(
              '            <div className="mt-5">\n              <div className="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">',
              '            <div className={`${isCustomEditorOpen ? "block" : "hidden"} mt-5`}>\n              <div className="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">',
              "custom steps visibility",
          )

          path.write_text(source, encoding="utf-8")
          PY

      - name: Lint
        run: npm run lint

      - name: Build GitHub Pages
        run: npm run build:github

      - name: Commit verified changes
        shell: bash
        run: |
          rm .github/workflows/apply-mobile-compact.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx .github/workflows/apply-mobile-compact.yml
          git commit -m "feat: add mobile compact recipe list"
          git push origin HEAD:feat/mobile-compact-recipe-list
